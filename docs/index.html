<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi primera página en GitHub Pages</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: white;
            padding: 20px;
        }

        h1 {
            margin: 0;
        }

        .portada {
            margin-top: 20px;
        }

        .portada img {
            max-width: 90%;
            height: auto;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Bienvenido a mi sitio</h1>
        <p>Mi primera página publicada con GitHub Pages</p>
    </header>

    <div class="portada">
        <h2>Imagen de portada</h2>
        <img src="JAIIO.jpg" alt="Imagen de portada">
    </div>

</body>
</html>
